services:
  - type: web
    name: stockxpert-backend
    rootDir: backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: snapshot-cache
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: STOCKXPERT_RECOMMENDATIONS_SNAPSHOT_DIR
        value: /var/data/stockxpert-cache
      - key: STOCKXPERT_SNAPSHOT_SCHEDULE_ENABLED
        value: "false"
      - key: STOCKXPERT_SNAPSHOT_CATCH_UP_ON_STARTUP
        value: "false"
      - key: STOCKXPERT_SNAPSHOT_TRIGGER_TOKEN
        generateValue: true

  - type: cron
    name: stockxpert-snapshot-refresh
    rootDir: backend
    runtime: python
    schedule: 30 2 * * 1-5
    buildCommand: pip install -r requirements.txt
    startCommand: >
      sh -c 'curl -fsS -X POST
      -H "x-snapshot-token: $STOCKXPERT_SNAPSHOT_TRIGGER_TOKEN"
      "http://$STOCKXPERT_BACKEND_HOSTPORT/api/admin/snapshots/rebuild"'
    envVars:
      - key: STOCKXPERT_BACKEND_HOSTPORT
        fromService:
          type: web
          name: stockxpert-backend
          property: hostport
      - key: STOCKXPERT_SNAPSHOT_TRIGGER_TOKEN
        fromService:
          type: web
          name: stockxpert-backend
          envVarKey: STOCKXPERT_SNAPSHOT_TRIGGER_TOKEN
