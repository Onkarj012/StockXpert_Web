  start: "2013-01-01"
  end: "2026-02-23"
  auto_adjust: true
  cache_dir: /tmp/data/prices

splits:
  train_end: "2025-06-30"
  val_end: "2025-12-31"
  test_end: "2026-02-23"

sentiment:
  mode: csv_sentiment
  csv_path: data/sentiment/combined_sentiment_2015_2025.csv
  tz: Asia/Kolkata
  market_close_time: "15:30:00"
  cache_dir: /tmp/data/sentiment
  gdelt:
    max_records_per_query: 250
    sleep_seconds: 1.0
    query_map: {}

features:
  horizons: [1, 3, 5, 7, 10]
  windows:
    short: 7
    mid: 21
    long: 60

  short_features:
    - log_return
    - volume_change
    - rsi_6
    - volatility_7
    - bb_zscore
    - rsi_delta
    - obv_divergence
    - price_vs_vwap

  mid_features:
    - rsi_14
    - macd
    - macd_signal
    - macd_hist
    - bb_width
    - sma_20_z
    - volatility_21
    - macd_momentum
    - zscore_velocity
    - mfi_14
    - stoch_k
    - chaikin_osc

  long_features:
    - adx
    - sma_50_z
    - volatility_60
    - trend_strength
    - regime_sma
    - vol_acceleration
    - sma_100_z
    - atr_14

  context_features:
    - bb_zscore
    - rsi_14
    - trend_strength
    - regime_sma
    - volatility_21
    - vol_expansion
    - pv_divergence
    - sentiment_mean
    - sentiment_momentum
    - sentiment_rolling_5d
    - rsi_delta
    - macd_momentum
    - fib_distance_to_nearest
    - fib_relative_position
    - fib_zone
    - natr
    - williams_r
    - cci

model:
  type: stockxpert
  hidden_dim: 128
  stock_embed_dim: 48
  attn_heads: 4
  dropout: 0.15

train:
  epochs: 120
  batch_size: 256
  lr: 0.0003
  weight_decay: 0.0001
  grad_clip: 1.0
  early_stopping_patience: 25
  loss_weights:
    direction: 0.5
    magnitude: 0.4
    variance: 0.1
    zone: 0.3
    confidence: 0.2
    magnitude_symmetry: 0.1

  # Balanced horizon weights (reduce H1 over-weighting)
  horizon_weights: [1.2, 1.0, 1.1, 1.1, 1.2]

  # Phase 5: Stronger downside weighting to reduce bullish bias
  direction_loss:
    gamma_pos: 1.5
    gamma_neg: 1.5
    downside_weight: 1.3

  oversampling:
    enabled: true
    alpha: 2.0
    min_weight: 1.0
    max_weight: 20.0

  lr_scheduler:
    type: "ReduceLROnPlateau"
    patience: 5
    factor: 0.5

reporting:
  make_plots: false
  equity_curve: false
  strategy:
    horizon: 1
    p_up_threshold: 0.55
    transaction_cost_bps: 10

# Enable walk-forward for robust training
walk_forward:
  enabled: false
  train_window: 504
  test_window: 63
  step_size: 21
  embargo_days: 5

scso:
  enabled: false
